version: 1

data_root: "data"

downloader:
  interval: "1d"
  auto_adjust: true
  batch_size: 200
  threads: true
  timeout_sec: 60
  retry: 2
  sleep_sec: 0.05

markets:

  # =========================
  # United States
  # =========================
  us:
    module: "markets.us"
    out_dir: "data/us/dayK"
    enabled: true
    week_rule: "W-FRI"
    month_rule: "ME"
    year_rule: "YE"
    limit: 0

    tick_distortion_filter_on: true
    tick_distortion_mode: "both"
    tick_distortion_threshold_pct: 10.0
    tick_distortion_min_ratio: 0.5

    low_price_filter_on: false


  # =========================
  # Canada (TSX / TSXV)
  # =========================
  ca:
    module: "markets.ca"
    out_dir: "data/ca/dayK"
    enabled: true
    week_rule: "W-FRI"
    month_rule: "ME"
