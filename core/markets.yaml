  de:
    module: "markets.germany"
    out_dir: "data/de/dayK"
    enabled: false
    week_rule: "W-FRI"
    month_rule: "ME"
    year_rule: "YE"
    limit: 0

    yf_suffix: ".DE"
    only_common: true

    segments:
      - "Prime Standard"
      - "General Standard"
      - "Entry Standard"

    list_url: "https://www.cashmarket.deutsche-boerse.com/resource/blob/313988/f4f80e006bf17d42e84dfb4b6b9ef341/data/Gelistete-Unternehmen.xls"

    tick_distortion_filter_on: true
